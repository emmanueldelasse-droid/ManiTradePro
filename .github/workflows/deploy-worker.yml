name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy manitradepro worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug — token presence (NE PAS afficher la valeur)
        env:
          TOKEN_SET: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
          TOKEN_LEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && '>=1' || '0' }}
        run: |
          echo "CLOUDFLARE_API_TOKEN défini : $TOKEN_SET"
          echo "Longueur approximative : $TOKEN_LEN"

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: cloudflare-worker
          command: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
