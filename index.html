<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>ManiTradePro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/components-v2-additions.css" />
  <link rel="stylesheet" href="css/screens.css" />
</head>
<body>

  <!-- MODE BANNER -->
  <div id="mode-banner" class="mode-banner mode-simulation">
    <span class="mode-icon">⚡</span>
    <span class="mode-label">MODE SIMULATION — Aucun argent réel</span>
  </div>

  <!-- APP SHELL -->
  <div id="app" class="app-shell">

    <!-- SIDEBAR (desktop) -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-mark">M</span>
        <span class="logo-text">ManiTrade<strong>Pro</strong></span>
      </div>

      <ul class="nav-list">
        <li><a href="#" data-screen="dashboard" class="nav-item active">
          <span class="nav-icon">◈</span><span>Tableau de bord</span>
        </a></li>
        <li><a href="#" data-screen="opportunities" class="nav-item">
          <span class="nav-icon">◎</span><span>Opportunités</span>
        </a></li>
        <li><a href="#" data-screen="portefeuille" class="nav-item">
          <span class="nav-icon">📊</span><span>Portefeuille</span>
        </a></li>
        <li><a href="#" data-screen="settings" class="nav-item">
          <span class="nav-icon">◬</span><span>Paramètres</span>
        </a></li>
      </ul>

      <div class="sidebar-status">
        <div class="status-dot active"></div>
        <span>Marché actif</span>
      </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">
      <div id="screen-dashboard"     class="screen"></div>
      <div id="screen-opportunities"  class="screen hidden"></div>
      <div id="screen-asset-detail"  class="screen hidden"></div>
      <div id="screen-portefeuille"  class="screen hidden"></div>
      <div id="screen-settings"      class="screen hidden"></div>
    </main>

    <!-- BOTTOM NAV (mobile) -->
    <nav class="bottom-nav" id="bottom-nav">
      <a href="#" data-screen="dashboard" class="bnav-item active">
        <span class="bnav-icon">◈</span>
        <span>Accueil</span>
      </a>
      <a href="#" data-screen="opportunities" class="bnav-item">
        <span class="bnav-icon">◎</span>
        <span>Signaux</span>
      </a>
      <a href="#" data-screen="portefeuille" class="bnav-item">
        <span class="bnav-icon">📊</span>
        <span>Portefeuille</span>
      </a>
      <a href="#" data-screen="settings" class="bnav-item">
        <span class="bnav-icon">◬</span>
        <span>Config</span>
      </a>
    </nav>

  </div>

  <!-- MODAL OVERLAY -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- TOAST NOTIFICATIONS -->
  <div id="toast-container" class="toast-container"></div>

  <!-- SINGLE BUNDLE — no ES modules needed -->
  <script src="js/app-bundle.js"></script>

</body>
</html>
