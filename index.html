<!DOCTYPE html>
<html lang="fr">
<head>
  <script>
    var t = localStorage.getItem('mtp_settings');
    if (t) { try { var s = JSON.parse(t); if (s.theme) document.documentElement.setAttribute('data-theme', s.theme); } catch(e){} }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>ManiTradePro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/components-v2-additions.css" />
  <link rel="stylesheet" href="css/screens.css" />
  <link rel="stylesheet" href="css/screens-v2-additions.css" />
</head>
<body>
  <div id="mode-banner" style="display:none;"></div>
  <div id="app" class="app-shell">

    <!-- Sidebar desktop -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-mark">M</span>
        <span class="logo-text">ManiTrade<strong>Pro</strong></span>
      </div>
      <ul class="nav-list">
        <li><a href="#" data-screen="dashboard" class="nav-item active">
          <span class="nav-icon">◈</span><span>Accueil</span>
        </a></li>
        <li><a href="#" data-screen="opportunities" class="nav-item">
          <span class="nav-icon">◎</span><span>Opportunités</span>
        </a></li>
        <li><a href="#" data-screen="portefeuille" class="nav-item">
          <span class="nav-icon">📊</span><span>Mes trades</span>
        </a></li>
        <li><a href="#" data-screen="news" class="nav-item">
          <span class="nav-icon">📰</span><span>News</span>
        </a></li>
        <li><a href="#" data-screen="settings" class="nav-item">
          <span class="nav-icon">◬</span><span>Réglages</span>
        </a></li>
      </ul>
      <div class="sidebar-status">
        <div class="status-dot active"></div>
        <span>Marché actif</span>
      </div>
    </nav>

    <!-- Contenu principal -->
    <main class="main-content" id="main-content"></main>

    <!-- Bottom nav mobile -->
    <nav class="bottom-nav" id="bottom-nav">
      <a href="#" data-screen="dashboard" class="bnav-item active">
        <span class="bnav-icon">◈</span><span>Accueil</span>
      </a>
      <a href="#" data-screen="opportunities" class="bnav-item">
        <span class="bnav-icon">◎</span><span>Signaux</span>
      </a>
      <a href="#" data-screen="portefeuille" class="bnav-item">
        <span class="bnav-icon">📊</span><span>Trades</span>
      </a>
      <a href="#" data-screen="news" class="bnav-item">
        <span class="bnav-icon">📰</span><span>News</span>
      </a>
      <a href="#" data-screen="settings" class="bnav-item">
        <span class="bnav-icon">◬</span><span>Config</span>
      </a>
    </nav>

  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Eruda debug -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <!-- Bundle principal -->
  <script src="js/app-bundle.js"></script>
</body>
</html>
