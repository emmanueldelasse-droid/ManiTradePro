<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1830"/>
      <stop offset="55%" stop-color="#080d1c"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="mStroke" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b582"/>
      <stop offset="100%" stop-color="#00e5a0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Cadre principal arrondi -->
  <rect width="512" height="512" rx="104" ry="104" fill="url(#bg)"/>

  <!-- Grille discrète -->
  <g stroke="rgba(255,255,255,0.025)" stroke-width="1">
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="342" y1="0" x2="342" y2="512"/>
  </g>

  <!-- Ligne de prix subtile en arrière-plan -->
  <path d="M 40 360 L 90 330 L 140 348 L 190 290 L 240 305 L 290 230 L 340 250 L 390 180 L 472 210"
        fill="none" stroke="rgba(0,229,160,0.16)" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glow derrière le M -->
  <path d="M 120 392 L 196 188 L 256 308 L 316 188 L 392 392"
        fill="none" stroke="#00e5a0" stroke-width="56"
        stroke-linecap="round" stroke-linejoin="round"
        opacity="0.32" filter="url(#glow)"/>

  <!-- M principal stylisé en deux pics ascendants -->
  <path d="M 120 392 L 196 188 L 256 308 L 316 188 L 392 392"
        fill="none" stroke="url(#mStroke)" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Point lumineux au sommet droit (target/objectif) -->
  <circle cx="316" cy="188" r="18" fill="#0a0e1a"/>
  <circle cx="316" cy="188" r="11" fill="#00e5a0"/>
  <circle cx="316" cy="188" r="22" fill="none" stroke="#00e5a0" stroke-width="2" opacity="0.35"/>
</svg>
