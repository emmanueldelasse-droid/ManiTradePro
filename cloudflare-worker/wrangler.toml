name = "manitradepro"
main = "worker.js"
compatibility_date = "2026-03-29"
account_id = "a44ec708d7642c774dc1f8c63f653c6b"
workers_dev = true

kv_namespaces = [
  { binding = "MTP_CACHE", id = "17eb7ddc41a949dd99bd840142832cfd" }
]

[triggers]
# Un seul cron toutes les 15 min, 24/7. Le handler `scheduled` dans worker.js
# fait le tri selon l'heure UTC et le jour :
#   - Crypto heures actives (6h-22h UTC)  : scan à chaque tick (15 min)
#   - Crypto nuit (22h-6h UTC)            : scan 1 tick sur 4 (~1 h)
#   - Actions heures de bourse US (lun-ven 13h30-20h UTC) : scan à chaque tick
#   - Actions hors-bourse / weekend       : skip actions (crypto only)
crons = [
  "*/15 * * * *"
]
